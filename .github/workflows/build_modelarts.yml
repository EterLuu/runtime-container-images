name: Build ModelArts Image

on:
  push:
    paths:
      - "modelarts/**"
  pull_request:
    branches:
      - "main"
    paths:
      - "modelarts/**"

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate metadata
        run: python3 scripts/modelarts_metadata.py validate

      - name: Get build matrix
        id: matrix
        run: |
          MATRIX="$(python3 scripts/modelarts_metadata.py build-matrix)"
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build context
        run: scripts/prepare_modelarts_context.sh "${{ matrix.path }}"

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          file: ${{ github.workspace }}/${{ matrix.path }}/Dockerfile
          context: ${{ github.workspace }}/${{ matrix.path }}
          outputs: type=image
          provenance: false
