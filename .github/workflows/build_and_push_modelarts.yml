name: Build and Publish ModelArts Image

on:
  workflow_call:
    inputs:
      modelarts_tag:
        description: "ModelArts image tag defined in modelarts_publish_version.json"
        required: true
        type: string
      publish:
        description: "Push the image to registries"
        default: false
        type: boolean
      image_repositories:
        description: "Optional override. Blank uses IMAGE_REPOSITORIES, then defaults to ghcr.io/<owner>/modelarts-cann."
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      modelarts_tag:
        description: "ModelArts image tag defined in modelarts_publish_version.json"
        required: true
        default: "9.0.0-910b-ubuntu22.04"
        type: string
      publish:
        description: "Push the image to registries"
        default: false
        type: boolean
      image_repositories:
        description: "Optional override. Blank uses IMAGE_REPOSITORIES, then defaults to ghcr.io/<owner>/modelarts-cann."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORIES: ${{ vars.IMAGE_REPOSITORIES }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate metadata
        run: python3 scripts/modelarts_metadata.py validate

      - name: Get publish matrix
        id: matrix
        run: |
          MATRIX="$(python3 scripts/modelarts_metadata.py publish-matrix --modelarts-tag "${{ inputs.modelarts_tag }}")"
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  only-build:
    name: build ${{ inputs.modelarts_tag }} (${{ matrix.platform }})
    if: ${{ !inputs.publish }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare build context
        run: scripts/prepare_modelarts_context.sh "${{ matrix.path }}"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          file: ${{ github.workspace }}/${{ matrix.path }}/Dockerfile
          context: ${{ github.workspace }}/${{ matrix.path }}
          outputs: type=image
          provenance: false

  build-push-digest:
    name: build ${{ inputs.modelarts_tag }} (${{ matrix.platform }})
    if: ${{ inputs.publish }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      DEFAULT_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/modelarts-cann
      INPUT_IMAGE_REPOSITORIES: ${{ inputs.image_repositories }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare build context
        run: scripts/prepare_modelarts_context.sh "${{ matrix.path }}"

      - name: Resolve repositories
        id: repositories
        run: |
          REPOSITORIES="${INPUT_IMAGE_REPOSITORIES:-${IMAGE_REPOSITORIES:-${DEFAULT_IMAGE_REPOSITORY}}}"
          {
            echo "repositories<<EOF"
            python3 scripts/modelarts_metadata.py repositories \
              --repositories "${REPOSITORIES}" \
              --format newline
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        if: ${{ contains(steps.repositories.outputs.repositories, 'ghcr.io/') }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: ${{ contains(steps.repositories.outputs.repositories, 'docker.io/') }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to Quay
        if: ${{ contains(steps.repositories.outputs.repositories, 'quay.io/') }}
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Login to Huawei Cloud SWR
        if: ${{ contains(steps.repositories.outputs.repositories, 'myhuaweicloud.com/') }}
        env:
          REPOSITORIES: ${{ steps.repositories.outputs.repositories }}
          SWR_USERNAME: ${{ secrets.SWR_USERNAME }}
          SWR_PASSWORD: ${{ secrets.SWR_PASSWORD }}
          SWR_TOKEN: ${{ secrets.SWR_TOKEN }}
          HW_USERNAME: ${{ secrets.HW_USERNAME }}
          HW_TOKEN: ${{ secrets.HW_TOKEN }}
        run: |
          set +x
          registries=()
          readarray -t repositories <<< "${REPOSITORIES}"
          for repository in "${repositories[@]}"; do
            [[ -z "${repository}" ]] && continue
            registry="${repository%%/*}"
            if [[ "${registry}" == *".myhuaweicloud.com" ]]; then
              registries+=("${registry}")
            fi
          done

          if [[ "${#registries[@]}" -eq 0 ]]; then
            exit 0
          fi

          username="${SWR_USERNAME:-${HW_USERNAME:-}}"
          password="${SWR_PASSWORD:-${SWR_TOKEN:-${HW_TOKEN:-}}}"

          if [[ -z "${username}" || -z "${password}" ]]; then
            echo "error: configure SWR_USERNAME/SWR_PASSWORD or HW_USERNAME/HW_TOKEN secrets for Huawei Cloud SWR"
            exit 1
          fi

          printf '%s\n' "${registries[@]}" | sort -u | while IFS= read -r registry; do
            printf '%s' "${password}" | docker login "${registry}" \
              --username "${username}" \
              --password-stdin
          done

      - name: Build and push by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: ${{ steps.repositories.outputs.repositories }}
          file: ${{ github.workspace }}/${{ matrix.path }}/Dockerfile
          context: ${{ github.workspace }}/${{ matrix.path }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ inputs.modelarts_tag }}-${{ matrix.artifact_arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  push-image:
    if: ${{ inputs.publish }}
    needs: build-push-digest
    runs-on: ubuntu-latest
    env:
      DEFAULT_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/modelarts-cann
      INPUT_IMAGE_REPOSITORIES: ${{ inputs.image_repositories }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.modelarts_tag }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve repositories
        id: repositories
        run: |
          REPOSITORIES="${INPUT_IMAGE_REPOSITORIES:-${IMAGE_REPOSITORIES:-${DEFAULT_IMAGE_REPOSITORY}}}"
          {
            echo "repositories<<EOF"
            python3 scripts/modelarts_metadata.py repositories \
              --repositories "${REPOSITORIES}" \
              --format newline
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        if: ${{ contains(steps.repositories.outputs.repositories, 'ghcr.io/') }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: ${{ contains(steps.repositories.outputs.repositories, 'docker.io/') }}
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Login to Quay
        if: ${{ contains(steps.repositories.outputs.repositories, 'quay.io/') }}
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Login to Huawei Cloud SWR
        if: ${{ contains(steps.repositories.outputs.repositories, 'myhuaweicloud.com/') }}
        env:
          REPOSITORIES: ${{ steps.repositories.outputs.repositories }}
          SWR_USERNAME: ${{ secrets.SWR_USERNAME }}
          SWR_PASSWORD: ${{ secrets.SWR_PASSWORD }}
          SWR_TOKEN: ${{ secrets.SWR_TOKEN }}
          HW_USERNAME: ${{ secrets.HW_USERNAME }}
          HW_TOKEN: ${{ secrets.HW_TOKEN }}
        run: |
          set +x
          registries=()
          readarray -t repositories <<< "${REPOSITORIES}"
          for repository in "${repositories[@]}"; do
            [[ -z "${repository}" ]] && continue
            registry="${repository%%/*}"
            if [[ "${registry}" == *".myhuaweicloud.com" ]]; then
              registries+=("${registry}")
            fi
          done

          if [[ "${#registries[@]}" -eq 0 ]]; then
            exit 0
          fi

          username="${SWR_USERNAME:-${HW_USERNAME:-}}"
          password="${SWR_PASSWORD:-${SWR_TOKEN:-${HW_TOKEN:-}}}"

          if [[ -z "${username}" || -z "${password}" ]]; then
            echo "error: configure SWR_USERNAME/SWR_PASSWORD or HW_USERNAME/HW_TOKEN secrets for Huawei Cloud SWR"
            exit 1
          fi

          printf '%s\n' "${registries[@]}" | sort -u | while IFS= read -r registry; do
            printf '%s' "${password}" | docker login "${registry}" \
              --username "${username}" \
              --password-stdin
          done

      - name: Prepare tags
        id: tags
        run: |
          REPOSITORIES="${INPUT_IMAGE_REPOSITORIES:-${IMAGE_REPOSITORIES:-${DEFAULT_IMAGE_REPOSITORY}}}"
          TAGS="$(python3 scripts/modelarts_metadata.py tags \
            --modelarts-tag "${{ inputs.modelarts_tag }}" \
            --repositories "${REPOSITORIES}")"
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          readarray -t TAGS_ARRAY <<< "$(echo "${TAGS}" | jq -r '.[]')"

          for tag in "${TAGS_ARRAY[@]}"; do
            repository="${tag%:*}"
            digest_refs=()
            for digest in *; do
              digest_refs+=("${repository}@sha256:${digest}")
            done
            docker buildx imagetools create -t "${tag}" "${digest_refs[@]}"
          done
