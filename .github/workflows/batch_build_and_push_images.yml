name: Batch Build and Publish Images

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: "Image version defined in image_publish_version.json"
        required: true
        default: "9.0.0"
        type: string
      publish:
        description: "Push the image to registries"
        default: false
        type: boolean
      image_repositories:
        description: "Optional override. Blank uses IMAGE_REPOSITORIES, then defaults to ghcr.io/<owner>/<platform>-<runtime>."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORIES: ${{ vars.IMAGE_REPOSITORIES }}

concurrency:
  group: batch-images
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate metadata
        run: python3 scripts/image_metadata.py validate

      - name: Generate matrix
        id: matrix
        run: |
          MATRIX="$(python3 scripts/image_metadata.py batch-matrix --image-version "${{ inputs.image_version }}")"
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    name: build ${{ matrix.image_tag }}
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/build_and_push_image.yml
    with:
      image_tag: ${{ matrix.image_tag }}
      image_key: ${{ matrix.image_key }}
      publish: ${{ inputs.publish }}
      image_repositories: ${{ inputs.image_repositories }}
    secrets: inherit
