name: Batch Build and Publish ModelArts Image

on:
  workflow_dispatch:
    inputs:
      modelarts_version:
        description: "ModelArts version defined in modelarts_publish_version.json"
        required: true
        default: "9.0.0"
        type: string
      publish:
        description: "Push the image to registries"
        default: false
        type: boolean
      image_repositories:
        description: "Optional override. Blank uses IMAGE_REPOSITORIES, then defaults to ghcr.io/<owner>/modelarts-cann."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORIES: ${{ vars.IMAGE_REPOSITORIES }}

concurrency:
  group: batch-modelarts
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate metadata
        run: python3 scripts/modelarts_metadata.py validate

      - name: Generate matrix
        id: matrix
        run: |
          MATRIX="$(python3 scripts/modelarts_metadata.py batch-matrix --modelarts-version "${{ inputs.modelarts_version }}")"
          echo "matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"

  build:
    name: build ${{ matrix.modelarts_tag }}
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/build_and_push_modelarts.yml
    with:
      modelarts_tag: ${{ matrix.modelarts_tag }}
      publish: ${{ inputs.publish }}
      image_repositories: ${{ inputs.image_repositories }}
    secrets: inherit
